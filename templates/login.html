<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — LITSchoolDiag</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="emoji">🎓</span>
      <h1>LITSchoolDiag</h1>
      <p class="subtitle">Система диагностики первоклассников</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
      </div>
      <div class="form-group flex items-center gap-2">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember" class="text-sm text-muted">Запомнить меня</label>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:12px;">
        Войти в систему
      </button>
    </form>
  </div>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
